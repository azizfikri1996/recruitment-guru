{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-9">
    <div class="card shadow-sm">
      <div class="card-header bg-white fw-semibold">Edit Soal Tes</div>
      <div class="card-body">
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Mata Pelajaran</label>
            <select name="subject_id" class="form-select" required>
              <option value="">Pilih mapel...</option>
              {% for s in subjects %}
                <option value="{{ s.id }}" {% if question.subject_id == s.id %}selected{% endif %}>{{ s.name }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Pertanyaan</label>
            <textarea name="question_text" class="form-control" rows="3" required>{{ question.question_text }}</textarea>
          </div>

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Pilihan A</label>
              <input type="text" name="option_a" class="form-control" value="{{ question.option_a }}" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Pilihan B</label>
              <input type="text" name="option_b" class="form-control" value="{{ question.option_b }}" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Pilihan C</label>
              <input type="text" name="option_c" class="form-control" value="{{ question.option_c }}" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Pilihan D</label>
              <input type="text" name="option_d" class="form-control" value="{{ question.option_d }}" required>
            </div>
          </div>

          <div class="mt-3 mb-4">
            <label class="form-label">Jawaban Benar</label>
            <select name="correct_option" class="form-select" required>
              <option value="">Pilih jawaban benar...</option>
              <option value="A" {% if question.correct_option == 'A' %}selected{% endif %}>A</option>
              <option value="B" {% if question.correct_option == 'B' %}selected{% endif %}>B</option>
              <option value="C" {% if question.correct_option == 'C' %}selected{% endif %}>C</option>
              <option value="D" {% if question.correct_option == 'D' %}selected{% endif %}>D</option>
            </select>
          </div>

          <div class="d-flex justify-content-between">
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary">Kembali</a>
            <button class="btn btn-primary">Simpan Perubahan</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card shadow-sm">
      <div class="card-header bg-white fw-semibold">Tambah Mata Pelajaran</div>
      <div class="card-body">
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Nama Mapel</label>
            <input type="text" name="name" class="form-control" placeholder="Contoh: Matematika" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Deskripsi (opsional)</label>
            <textarea name="description" class="form-control" rows="3" placeholder="Contoh: Fokus aljabar, geometri, statistika dasar"></textarea>
          </div>
          <div class="d-flex justify-content-between">
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary">Kembali</a>
            <button class="btn btn-primary">Simpan</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
